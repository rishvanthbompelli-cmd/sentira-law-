<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentira Law - AI-Powered Emotional Legal Mediator</title>
    <style>
      /* Reset all default margins and padding */
      html, body {
        margin: 0;
        padding: 0;
        border: 0;
      }
      /* Reset video and other media elements */
      video, .video-overlay {
        margin: 0;
        padding: 0;
        border: 0;
      }
      /* Ensure video is positioned behind everything */
      #bg-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
      }
      .video-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.7);
        z-index: 0;
      }
    </style>
  </head>
  <body>
    <!-- Background video: place your file at /public/videos/bg.mp4 -->
    <video id="bg-video" autoplay muted loop playsinline>
      <source src="/videos/bg.mp4" type="video/mp4" />
      <!-- Fallback text -->
      Your browser does not support the video tag.
    </video>
    <div class="video-overlay"></div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- n8n Official Chat Widget -->
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    <style>
      /* Enforce high z-index and prevent overflow issues from parents */
      :root {
        --chat--z-index: 999999;
      }
      body {
        overflow-x: hidden; /* Only disable horizontal scroll if needed, keep vertical scroll */
      }
    </style>
    <script type="module">
      import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

      createChat({
          // My ngrok webhook URL
          webhookUrl: 'https://basinlike-hermila-nonmeditative.ngrok-free.dev/webhook/e8337304-9fe3-46f0-9283-69954e4700ba/chat', 
          
          // Custom greeting for Sentira Law
          initialMessages: [
              'Welcome to Sentira Law! I am your AI legal assistant. How can I help you today?'
          ],
          
          // Custom header text
          i18n: {
              en: {
                  title: 'Sentira Law Assistant ⚖️',
                  subtitle: "Start a chat. We're here to help you 24/7.",
              },
          },
      });
    </script>
  </body>
</html>
