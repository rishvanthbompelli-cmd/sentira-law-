<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentira Law - AI-Powered Emotional Legal Mediator</title>
    <style>
      /* Reset all default margins and padding */
      html, body {
        margin: 0;
        padding: 0;
        border: 0;
      }
      /* Reset video and other media elements */
      video, .video-overlay {
        margin: 0;
        padding: 0;
        border: 0;
      }
      /* Ensure video is positioned behind everything */
      #bg-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
      }
      .video-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.7);
        z-index: 0;
      }
    </style>
  </head>
  <body>
    <!-- Background video: place your file at /public/videos/bg.mp4 -->
    <video id="bg-video" autoplay muted loop playsinline>
      <source src="/videos/bg.mp4" type="video/mp4" />
      <!-- Fallback text -->
      Your browser does not support the video tag.
    </video>
    <div class="video-overlay"></div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- n8n Official Chat Widget -->
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    <style>
      /* Professional Corporate Legal Theme for n8n Chat */
      :root {
        --chat--z-index: 999999;
        /* Crisp, professional solid colors */
        --chat--color-primary: #1e3a8a; /* Deep blue */
        --chat--color-primary-shade-50: #172554;
        --chat--color-primary-shade-100: #1e3a8a;
        --chat--color-secondary: #f8fafc; /* Crisp light background */
        --chat--color-secondary-shade-50: #f1f5f9;
        --chat--color-white: #ffffff;
        --chat--color-font: #0f172a;
        --chat--color-light-font: #475569;
        
        /* Chat Window styling */
        --chat--window--width: 400px;
        --chat--window--height: 600px;
        --chat--window--border-radius: 12px;
        
        /* Elements */
        --chat--toggle--background: #1e3a8a;
        --chat--toggle--hover--background: #172554;
        --chat--toggle--color: #ffffff;
        
        /* Header */
        --chat--header--background: #1e3a8a;
        --chat--header--color: #ffffff;
        --chat--header--font-weight: 600;
        
        /* Message Area */
        --chat--message--background: #f8fafc;
        --chat--message--color: #0f172a;
        
        /* Appended/User messages */
        --chat--message--user--background: #1e3a8a;
        --chat--message--user--color: #ffffff;
        --chat--message--bot--background: #ffffff;
        --chat--message--bot--color: #0f172a;
        --chat--message--border-radius: 10px;
        
        /* Input area */
        --chat--input--background: #ffffff;
        --chat--input--color: #0f172a;
        --chat--input--border: 1px solid #cbd5e1;
      }
      
      body {
        overflow-x: hidden;
      }
      
      /* Solid, clean UI overrides without blur/transparency */
      .chat-window {
        background-color: #f8fafc !important;
        border: 1px solid #e2e8f0 !important;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15), 0 8px 10px -6px rgba(0, 0, 0, 0.1) !important;
        font-family: "Inter", -apple-system, sans-serif !important;
      }
      
      /* Crisp Button */
      .chat-toggle {
        box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.4), 0 4px 6px -4px rgba(30, 58, 138, 0.2) !important;
        transition: transform 0.2s ease, box-shadow 0.2s ease !important;
      }
      
      .chat-toggle:hover {
        transform: translateY(-2px) !important;
        box-shadow: 0 20px 25px -5px rgba(30, 58, 138, 0.5), 0 8px 10px -6px rgba(30, 58, 138, 0.3) !important;
      }
      
      .chat-message.bot {
        border: 1px solid #e2e8f0;
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      }
    </style>
    <script type="module">
      import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

      createChat({
          // My ngrok webhook URL
          webhookUrl: 'https://basinlike-hermila-nonmeditative.ngrok-free.dev/webhook/e8337304-9fe3-46f0-9283-69954e4700ba/chat', 
          
          // Custom greeting for Sentira Law
          initialMessages: [
              'Welcome to Sentira Law! I am your AI legal assistant. How can I help you today?'
          ],
          
          // Custom header text
          i18n: {
              en: {
                  title: 'Sentira Law Assistant ⚖️',
                  subtitle: "Start a chat. We're here to help you 24/7.",
              },
          },
      });
    </script>
  </body>
</html>
